<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himalayan Vault - Forgot Password</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="forgot-password.css">
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="popup.css">
    
</head>
<body class="forgot-password-page">
    <div class="background-container">
        <img src="icons/background_image.png" alt="Background" class="background-image">
    </div>

    <header class="header">
        <div class="logo-container">
            <img src="icons/icon.png" alt="Himalayan Vault" class="logo-icon">
            <div class="logo-text">
                <span class="logo-main">HIMALAYAN</span>
                <span class="logo-sub">VAULT</span>
            </div>
        </div>
    </header>

    <div class="login-wrapper">
        <form id="forgotPasswordForm" class="login-form">
            <h2 class="form-title">Forgot Password</h2>
            
            <div class="step" id="step1">
                <p class="step-description">Step 1: Enter your username and 16 recovery words (separated by spaces).</p>

                <div class="form-group input-field">
                    <input type="text" id="username" name="username" placeholder="Username" required>
                    <label for="username">Username</label>
                </div>

                <div class="form-group">
                    <textarea id="recoveryWords" placeholder="Enter 16 recovery words separated by spaces" rows="4"></textarea>
                </div>

                <div class="button-group">
                    <button type="button" class="login-btn" id="step1NextBtn">Next</button>
                </div>
            </div>

            <div class="step" id="step2" style="display: none;">
                <p class="step-description">Step 2: Set a new master password.</p>

                <div class="form-group input-field">
                    <input type="password" id="newPassword" name="newPassword" placeholder="New password" required>
                    <label for="newPassword">New password</label>
                </div>

                <div class="form-group input-field">
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Confirm new password" required>
                    <label for="confirmNewPassword">Confirm new password</label>
                </div>

                <div class="password-strength" id="strengthIndicator">
                    <div class="strength-bar"></div>
                    <span class="strength-text">Password strength</span>
                </div>

                <div class="button-group">
                    <button type="button" class="login-btn" id="step2NextBtn">Next</button>
                    <button type="button" class="cancel-btn" id="step2BackBtn">Back</button>
                </div>
            </div>

            <div class="step" id="step3" style="display: none;">
                <p class="step-description">Step 3: Confirm and reset your password.</p>
                <div class="form-group">
                    <p id="confirmationMsg" class="step-description" style="color:#64e8ff"></p>
                </div>
                <div class="button-group">
                    <button type="button" class="login-btn" id="completeResetBtn">Reset Password</button>
                    <button type="button" class="cancel-btn" id="step3BackBtn">Back</button>
                </div>
            </div>
            
            <div class="form-links">
                <a href="login.html" class="link">Back to Login</a>
            </div>
        </form>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
