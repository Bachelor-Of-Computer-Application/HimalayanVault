<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Himalayan Vault</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body class="futuristic-bg">
    <!-- Login Screen -->
    <div id="loginPanel" class="login-panel">
        <div class="background-container">
            <img src="icons/background_image.png" alt="Background" class="background-image">
        </div>
        
        <!-- Logo - Top Left -->
        <div class="logo-header">
            <img src="icons/icon.png" alt="Himalayan Vault" class="logo-icon-img">
            <div class="logo-text-col">
                <span class="logo-main-text">HIMALAYAN</span>
                <span class="logo-sub-text">VAULT</span>
            </div>
        </div>

        <!-- Main Container -->
        <div class="login-container">
            <!-- Login Form -->
            <form id="loginForm" class="login-box-form">
                <h2 class="form-title">Login</h2>
                
                <!-- Username Field -->
                <div class="form-group-line">
                    <input type="text" id="username" class="form-input-line" placeholder="Enter your username" required>

                <!-- Password Field -->
        
                    <input type="password" id="password" class="form-input-line" placeholder="Enter your password" required>
                </div>

                <!-- Error Message -->
                <div id="loginError" class="error-msg" style="display:none;"></div>

                <!-- Login Button with Biometric Options -->
                <div class="button-group-row">
                    <button type="submit" class="login-btn-gradient">LOG IN</button>
                    <button type="button" class="biometric-btn-glow fingerprint-btn" title="Biometric Authentication">BIO</button>
                </div>

                <!-- Footer Links -->
                <div class="form-links-row">
                    <a href="#" class="link-cyan">Forgot Password</a>
                    <a href="#" class="link-cyan">Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel" class="panel" style="display:none;">
        <div class="header">
            <h2>Himalayan Vault</h2>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>

        <!-- Credentials List -->
        <div class="section">
            <h3>Saved Credentials</h3>
            <div id="credentialsList" class="credentials-list"></div>
        </div>

        <!-- Generate Password -->
        <div class="section">
            <h3>Generate Password</h3>
            <div class="form-group">
                <label for="pwLength">Length:</label>
                <input type="number" id="pwLength" min="8" max="128" value="16">
            </div>
            <div class="checkboxes">
                <label><input type="checkbox" id="pwUppercase" checked> Uppercase</label>
                <label><input type="checkbox" id="pwLowercase" checked> Lowercase</label>
                <label><input type="checkbox" id="pwNumbers" checked> Numbers</label>
                <label><input type="checkbox" id="pwSpecialChars" checked> Special Characters</label>
            </div>
            <button id="generateBtn" class="btn btn-primary">Generate</button>
            <div id="generatedPassword" class="generated-password"></div>
        </div>

        <!-- Add New Credential -->
        <div class="section">
            <h3>Save New Credential</h3>
            <form id="newCredForm">
                <div class="form-group">
                    <label for="siteName">Site Name:</label>
                    <input type="text" id="siteName" required>
                </div>
                <div class="form-group">
                    <label for="siteUrl">Site URL:</label>
                    <input type="url" id="siteUrl" required>
                </div>
                <div class="form-group">
                    <label for="siteUsername">Username:</label>
                    <input type="text" id="siteUsername" required>
                </div>
                <div class="form-group">
                    <label for="sitePassword">Password:</label>
                    <input type="password" id="sitePassword" required>
                </div>
                <div class="form-group">
                    <label for="siteNotes">Notes (optional):</label>
                    <textarea id="siteNotes"></textarea>
                </div>
                <div id="saveError" class="error" style="display:none;"></div>
                <button type="submit" class="btn btn-primary">Save Credential</button>
            </form>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
