<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himalayan Vault - Forgot Password</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body class="forgot-password-page">
    <div class="background-container">
        <img src="icons/background_image.png" alt="Background" class="background-image">
    </div>

    <header class="header">
        <div class="logo-container">
            <img src="icons/icon.png" alt="Himalayan Vault" class="logo-icon">
            <div class="logo-text">
                <span class="logo-main">HIMALAYAN</span>
                <span class="logo-sub">VAULT</span>
            </div>
        </div>
    </header>

    <div class="login-wrapper">
        <form id="forgotPasswordForm" class="login-form">
            <h2 class="form-title">Forgot Password</h2>
            
            <div class="step" id="emailStep">
                <p class="step-description">Enter your email address to receive recovery instructions.</p>
                
                <div class="form-group input-field">
                    <input type="email" id="email" name="email" placeholder="Email address" required>
                    <label for="email">Email address</label>
                </div>
                
                <div class="button-group">
                    <button type="button" class="login-btn" id="sendCodeBtn">Send Recovery Code</button>
                </div>
            </div>

            <div class="step" id="verifyStep" style="display: none;">
                <p class="step-description">Enter the verification code sent to your email.</p>
                
                <div class="form-group input-field">
                    <input type="text" id="verificationCode" name="verificationCode" placeholder="6-digit code" maxlength="6" required>
                    <label for="verificationCode">Verification Code</label>
                </div>
                
                <div class="button-group">
                    <button type="button" class="login-btn" id="verifyCodeBtn">Verify Code</button>
                    <button type="button" class="cancel-btn" id="backToEmailBtn">Back</button>
                </div>
            </div>

            <div class="step" id="resetStep" style="display: none;">
                <p class="step-description">Create your new password.</p>
                
                <div class="form-group input-field">
                    <input type="password" id="newPassword" name="newPassword" placeholder="New password" required>
                    <label for="newPassword">New password</label>
                </div>
                
                <div class="form-group input-field">
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Confirm new password" required>
                    <label for="confirmNewPassword">Confirm new password</label>
                </div>

                <div class="password-strength" id="strengthIndicator">
                    <div class="strength-bar"></div>
                    <span class="strength-text">Password strength: weak</span>
                </div>
                
                <div class="button-group">
                    <button type="button" class="login-btn" id="resetPasswordBtn">Reset Password</button>
                    <button type="button" class="cancel-btn" id="backToLoginBtn">Back to Login</button>
                </div>
            </div>
            
            <div class="form-links">
                <a href="login.html" class="link">Back to Login</a>
            </div>
        </form>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
